version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd credit-card-tracker/frontend
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: credit-card-tracker/frontend/dist
    files:
      - '**/*'
  cache:
    paths:
      - credit-card-tracker/frontend/node_modules/**/*
